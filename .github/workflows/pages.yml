name: Deploy live demos (GitHub Pages)

# Publie le dépôt sur GitHub Pages → démo en ligne de tous les templates + Atelier.
# Galerie : https://<user>.github.io/<repo>/demos.html
# Se relance à chaque push sur main (et manuellement via l'onglet Actions).
# NB: garder ce workflow — c'est lui qui déploie tant que la source Pages est "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
